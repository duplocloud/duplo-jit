name: Lint and Format
on:
  pull_request:
  push:
    branches-ignore:
      - master
      - release/*
    tags-ignore:
      - v*
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v5
      -
        name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25
      - 
        name: Run linting
        uses: golangci/golangci-lint-action@v8
        with:
          only-new-issues: ${{ github.event_name == 'pull_request' }}
          args: --timeout 2m
  format:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v5
      -
        name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25
      - 
        name: Run formatting
        run: gofmt -s -w duplocloud cmd/duplo-aws-credential-process
      - 
        name: Check if formatting changed
        id: git-check
        run: echo "modified=$(if git diff-index --quiet HEAD --; then echo "false"; else echo "true"; fi)" >>$GITHUB_OUTPUT
      - 
        name: Commit formatting changes
        if: steps.git-check.outputs.modified == 'true'
        run: |
          git config --global user.name 'Duplo Github Bot'
          git config --global user.email 'infra+github-bot@duplocloud.net'
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git commit -am "lint: go fmt"
          git push
